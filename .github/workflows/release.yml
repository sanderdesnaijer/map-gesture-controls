name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      core--release_created: ${{ steps.release.outputs['packages/map-gesture-core--release_created'] }}
      core--tag_name: ${{ steps.release.outputs['packages/map-gesture-core--tag_name'] }}
      ol--release_created: ${{ steps.release.outputs['packages/ol-gesture-controls--release_created'] }}
      ol--tag_name: ${{ steps.release.outputs['packages/ol-gesture-controls--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-core:
    needs: release-please
    if: needs.release-please.outputs.core--release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build:libs
      - run: npm publish --workspace packages/map-gesture-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-ol:
    needs: release-please
    if: needs.release-please.outputs.ol--release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build:libs
      - run: npm publish --workspace packages/ol-gesture-controls
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
