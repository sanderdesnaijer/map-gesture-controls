<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Minimal map-gesture-controls setup: enable hand gesture pan and zoom on an OpenStreetMap tile layer with a single GestureMapController call." />
  <title>Basic OSM setup - map-gesture-controls</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.2.1/ol.css" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; color: #e8e8e8; font-family: system-ui, sans-serif; font-size: 14px; }
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; height: 44px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .label { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: #888; margin-right: auto; }
    #map { width: 100%; height: calc(100% - 44px); }
    button {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(68,136,255,0.2); color: #fff;
      cursor: pointer; font-size: 13px;
    }
    button:hover:not(:disabled) { background: rgba(68,136,255,0.45); }
    button:disabled { opacity: 0.4; cursor: default; }
    button.btn-secondary {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
    }
    button.btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.12); }
    #status { font-size: 12px; color: #888; min-width: 110px; }
  </style>
</head>
<body>
  <header class="toolbar">
    <span class="label">Basic OSM setup</span>
    <button id="btn-start">Enable Gestures</button>
    <button id="btn-stop" disabled>Disable</button>
    <button type="button" id="btn-fullscreen" class="btn-secondary">Fullscreen</button>
    <span id="status">Gestures off</span>
  </header>
  <main id="map"></main>
  <script type="module" src="./demo-basic.ts"></script>
</body>
</html>
